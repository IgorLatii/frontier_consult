# === BOT CONFIG ===
bot.name=${BOT_NAME:frontier_consult_bot}
bot.token=${BOT_TOKEN:default_token}
bot.owner=${BOT_OWNER:default_owner}

# === DATABASE CONFIG ===
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:3306/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# === AI SERVICE CONFIG ===
fastapi.url=${FASTAPI_URL:http://fastapi:8000/ask}